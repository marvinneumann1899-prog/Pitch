# XcodeGen-Spec — erzeugt Pitch.xcodeproj aus PitchSources/.
# Neu generieren nach Änderungen:  xcodegen generate --spec project.yml
name: Pitch
options:
  bundleIdPrefix: de.neumanns
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
targets:
  Pitch:
    type: application
    platform: iOS
    sources:
      - path: PitchSources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: de.neumanns.pitch
        MARKETING_VERSION: "0.1"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "5.0"
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
